                      </div>
                    ))}
                  </div>
                </div>
              ))}

              <div className="border-l-4 p-6 rounded-r-lg" style={{ borderColor: colors.magenta, backgroundColor: 'rgba(225, 0, 152, 0.05)' }}>
                <p className="font-semibold text-slate-900 mb-2">Content Strategy Notes</p>
                <ul className="list-disc list-inside text-slate-700 space-y-2 text-sm">
                  <li>Each blog post should be 1,000–1,500 words and link to at least 2–3 relevant service pages internally</li>
                  <li>Publish 4 posts per month (1 per week) during Phases 1–2, scaling to 8 posts per month in Phase 3</li>
                  <li>Seasonal angles (e.g., spring family photos, back-to-school) capture demand spikes and improve click-through rates</li>
                  <li>Cross-service posts (e.g., "Family + Pets", "Hockey + Headshots") deepen topic clusters and internal linking</li>
                  <li>French content targets bilingual Ottawa-Gatineau audience; Mathieu-photo.com is your primary FR SEO competitor</li>
                  <li>Use Alicia's vet tech background as a unique angle for pet photography—emphasize stress-free, animal-first approach</li>
                </ul>
              </div>
            </div>

            <div className="bg-white rounded-xl border border-slate-200 p-8 mb-16">
              <h2 className="text-3xl font-bold text-slate-900 mb-6 flex items-center">
                <span className="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold mr-4" style={{ backgroundColor: colors.cobalt }}>6</span>
                Recommended Next Steps (Immediate Actions)
              </h2>

              <div className="space-y-6">
                <div className="border rounded-lg p-6 border-slate-200">
                  <h3 className="text-lg font-bold text-slate-900 mb-3 flex items-center">
                    <span className="w-6 h-6 rounded-full flex items-center justify-center text-white text-sm font-bold mr-3" style={{ backgroundColor: colors.cobalt }}>1</span>
                    Set Up Google Business Profile & Local SEO (Week 1)
                  </h3>
                  <ul className="list-disc list-inside text-slate-700 space-y-1 text-sm">
                    <li>Claim and optimize GBP for aliciariddle.ca with full details, high-quality photos, service categories</li>
                    <li>Add local schema (LocalBusiness, Service) to homepage</li>
                    <li>Create local citations on Yelp, BNI, Ottawa Chamber of Commerce, Google Maps</li>
                  </ul>
                </div>

                <div className="border rounded-lg p-6 border-slate-200">
                  <h3 className="text-lg font-bold text-slate-900 mb-3 flex items-center">
                    <span className="w-6 h-6 rounded-full flex items-center justify-center text-white text-sm font-bold mr-3" style={{ backgroundColor: colors.cobalt }}>2</span>
                    Create High-Priority Service Pages (Weeks 1–2)
                  </h3>
                  <ul className="list-disc list-inside text-slate-700 space-y-1 text-sm">
                    <li>/hockey: 800+ words, target 'hockey photography', 'hockey photographer', 'hockey team photos'</li>
                    <li>/family: 800+ words, target 'family photography near me', 'family photos ottawa'</li>
                    <li>/corporate or /headshots: 800+ words, target 'headshots ottawa', 'professional headshots'</li>
                    <li>Include unique USP (vet tech background for pets, local community focus for hockey)</li>
                  </ul>
                </div>

                <div className="border rounded-lg p-6 border-slate-200">
                  <h3 className="text-lg font-bold text-slate-900 mb-3 flex items-center">
                    <span className="w-6 h-6 rounded-full flex items-center justify-center text-white text-sm font-bold mr-3" style={{ backgroundColor: colors.cobalt }}>3</span>
                    Launch Blog & Publish First 4 Posts (Weeks 2–3)
                  </h3>
                  <ul className="list-disc list-inside text-slate-700 space-y-1 text-sm">
                    <li>Set up blog section with category structure (Hockey, Family, Corporate, Pets, Local)</li>
                    <li>Publish 4 posts: 1 per category, targeting quick-win keywords (see Phase 1 content calendar)</li>
                    <li>Each post: 1,000–1,500 words, keyword-rich, 2–3 internal links to service pages</li>
                  </ul>
                </div>

                <div className="border rounded-lg p-6 border-slate-200">
                  <h3 className="text-lg font-bold text-slate-900 mb-3 flex items-center">
                    <span className="w-6 h-6 rounded-full flex items-center justify-center text-white text-sm font-bold mr-3" style={{ backgroundColor: colors.cobalt }}>4</span>
                    Set Up SEO Tools & Analytics (Week 1)
                  </h3>
                  <ul className="list-disc list-inside text-slate-700 space-y-1 text-sm">
                    <li>Link Semrush or Ahrefs account to site; set up daily ranking tracking for all 44 keywords</li>
                    <li>Install Google Analytics 4 and Google Search Console; link to Google Business Profile</li>
                    <li>Set up monthly reporting to track progress against Phase targets (see benchmarks above)</li>
                  </ul>
                </div>

                <div className="border rounded-lg p-6 border-slate-200">
                  <h3 className="text-lg font-bold text-slate-900 mb-3 flex items-center">
                    <span className="w-6 h-6 rounded-full flex items-center justify-center text-white text-sm font-bold mr-3" style={{ backgroundColor: colors.cobalt }}>5</span>
                    Plan French-Language Expansion (Weeks 3–4)
                  </h3>
                  <ul className="list-disc list-inside text-slate-700 space-y-1 text-sm">
                    <li>Audit current bilingual capabilities; plan site structure (separate /fr-ca/ paths or hreflang)</li>
                    <li>Draft 2–3 French blog posts for publication in April (photographe gatineau, séance photo, etc.)</li>
                    <li>Hire French copywriter or translator if needed; ensure native-level French writing</li>
                  </ul>
                </div>

                <div className="border rounded-lg p-6 border-slate-200">
                  <h3 className="text-lg font-bold text-slate-900 mb-3 flex items-center">
                    <span className="w-6 h-6 rounded-full flex items-center justify-center text-white text-sm font-bold mr-3" style={{ backgroundColor: colors.cobalt }}>6</span>
                    Build Initial Backlink Strategy (Weeks 2–4)
                  </h3>
                  <ul className="list-disc list-inside text-slate-700 space-y-1 text-sm">
                    <li>Reach out to 10–15 local directories and photography websites for links</li>
                    <li>Claim existing mentions (Inkline portfolio, school photography directories, etc.)</li>
                    <li>Plan 2–3 guest posts for local blogs or photography industry sites (target for April–May publication)</li>
                  </ul>
                </div>
              </div>

              <div className="border-l-4 p-6 rounded-r-lg mt-8" style={{ borderColor: colors.magenta, backgroundColor: 'rgba(225, 0, 152, 0.05)' }}>
                <p className="font-semibold text-slate-900 mb-2">Success Metrics (3-Month Check-in, May 2026)</p>
                <ul className="list-disc list-inside text-slate-700 space-y-2 text-sm">
                  <li><span className="font-semibold">Rankings:</span> 10–15 keywords in top 20 (5+ in top 10)</li>
                  <li><span className="font-semibold">Traffic:</span> 300–500 monthly visits from organic search</li>
                  <li><span className="font-semibold">Pages:</span> 5–8 optimized service pages + 8–10 blog posts live</li>
                  <li><span className="font-semibold">Engagement:</span> Average time-on-page ≥1:30, bounce rate ≤65%</li>
                  <li><span className="font-semibold">Conversions:</span> 5–10 inquiry-form submissions (depends on traffic)</li>
                </ul>
              </div>

            <div className="rounded-xl p-8 text-center text-white mt-20 mb-16" style={{ background: `linear-gradient(135deg, ${colors.cobalt} 0%, ${colors.cerulean} 100%)` }}>

                <span className="text-white opacity-50">+</span>
                <ARPLogo variant="white" className="h-20" />

              <p className="text-sm opacity-90 mb-4">Keyword Research Report • Prepared for Alicia Riddle Photography</p>
              <p className="text-xs opacity-75">Data sourced from Semrush competitive intelligence analysis. All metrics current as of February 2026.</p>
            </div>
